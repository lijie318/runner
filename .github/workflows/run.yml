name: Run Service

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: run-group
  cancel-in-progress: false

env:
  PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
  CF_TUNNEL_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN }}
  MANAGEMENT_PASSWORD: ${{ secrets.MANAGEMENT_PASSWORD }}
  API_KEY: ${{ secrets.API_KEY }}
  RUN_DURATION: 19800

jobs:
  run:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout runner repo
        uses: actions/checkout@v4

      - name: Checkout CLIProxyAPI
        uses: actions/checkout@v4
        with:
          repository: router-for-me/CLIProxyAPI
          path: cliproxy
          fetch-depth: 1

      - name: Checkout backup repository
        uses: actions/checkout@v4
        with:
          repository: jjjjllll111/db-storage
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: db-repo
          fetch-depth: 1
          persist-credentials: true

      - name: Prepare deploy dir
        run: |
          set -Eeuo pipefail
          mkdir -p deploy
          cp cliproxy/docker-compose.yml deploy/docker-compose.yml
          mkdir -p deploy/auths deploy/logs deploy/plugins
          # restore previous data if present (config + auths + logs)
          MIN_BACKUP=200
          if [ -f db-repo/cliproxy-data.tar.gz ]; then
            sz=$(stat -c%s db-repo/cliproxy-data.tar.gz)
            if [ "$sz" -lt "$MIN_BACKUP" ]; then
              echo "[!] backup too small (${sz}B) — fresh start"
            else
              sudo tar -xzf db-repo/cliproxy-data.tar.gz -C deploy
              echo "[*] restored cliproxy-data.tar.gz (${sz}B)"
              sudo du -sh deploy/auths deploy/logs deploy/plugins deploy/config.yaml 2>/dev/null || true
            fi
          else
            echo "[*] no prior backup; fresh start"
          fi
          # config.yaml — keep restored; else seed from example
          if [ ! -f deploy/config.yaml ]; then
            cp cliproxy/config.example.yaml deploy/config.yaml
            export API_KEY="${API_KEY:-$(openssl rand -hex 16)}"
            export MANAGEMENT_PASSWORD="${MANAGEMENT_PASSWORD:-$(openssl rand -hex 12)}"
            python3 - <<'PY'
          import os, re, pathlib
          p = pathlib.Path("deploy/config.yaml")
          text = p.read_text(encoding="utf-8")
          key = os.environ["API_KEY"]
          mgmt = os.environ["MANAGEMENT_PASSWORD"]
          text = re.sub(
              r"api-keys:\n(?:\s*-\s*\"[^\"]*\"\n)+",
              f'api-keys:\n  - "{key}"\n',
              text,
              count=1,
          )
          text = re.sub(
              r"(allow-remote:\s*)\S+",
              r"\1true",
              text,
              count=1,
          )
          text = re.sub(
              r'(secret-key:\s*)""',
              rf'\1"{mgmt}"',
              text,
              count=1,
          )
          p.write_text(text, encoding="utf-8")
          print("[*] wrote fresh config.yaml")
          PY
            echo "API_KEY=$API_KEY" >> "$GITHUB_ENV"
            echo "MANAGEMENT_PASSWORD=$MANAGEMENT_PASSWORD" >> "$GITHUB_ENV"
          else
            echo "[*] keeping restored config.yaml"
          fi
          # warp overlay — service name matches CLIProxyAPI compose
          cat > deploy/docker-compose.warp.yml <<'YAML'
          services:
            warp:
              image: seiry/cloudflare-warp-proxy
              container_name: cliproxy-warp
              restart: unless-stopped
              logging:
                driver: json-file
                options:
                  max-size: 1m
                  max-file: "2"
            cli-proxy-api:
              environment:
                - HTTP_PROXY=socks5://warp:40000
                - HTTPS_PROXY=socks5://warp:40000
                - ALL_PROXY=socks5://warp:40000
                - NO_PROXY=localhost,127.0.0.1,warp
                - MANAGEMENT_PASSWORD=${MANAGEMENT_PASSWORD:-}
              depends_on:
                - warp
          YAML
          sed -i 's/^          //' deploy/docker-compose.warp.yml
          # bind host ports only on 127.0.0.1 (tunnel fronts public)
          sed -i 's/"8317:8317"/"127.0.0.1:8317:8317"/; s/"8085:8085"/"127.0.0.1:8085:8085"/; s/"1455:1455"/"127.0.0.1:1455:1455"/; s/"54545:54545"/"127.0.0.1:54545:54545"/; s/"51121:51121"/"127.0.0.1:51121:51121"/; s/"11451:11451"/"127.0.0.1:11451:11451"/' deploy/docker-compose.yml
          echo "COMPOSE_FILE=docker-compose.yml:docker-compose.warp.yml" >> "$GITHUB_ENV"
          echo "[*] deploy ready"

      - name: Start CLIProxyAPI (docker compose + warp)
        working-directory: deploy
        env:
          COMPOSE_FILE: docker-compose.yml:docker-compose.warp.yml
          CLI_PROXY_CONFIG_PATH: ./config.yaml
          CLI_PROXY_AUTH_PATH: ./auths
          CLI_PROXY_LOG_PATH: ./logs
          CLI_PROXY_PLUGIN_PATH: ./plugins
          MANAGEMENT_PASSWORD: ${{ env.MANAGEMENT_PASSWORD }}
        run: |
          set -Eeuo pipefail
          docker compose pull
          docker compose up -d warp
          ready=0
          for i in $(seq 1 40); do
            if ! docker compose ps --status running --services 2>/dev/null | grep -qx warp; then
              sleep 3
              continue
            fi
            net=$(docker inspect -f '{{range $k,$v := .NetworkSettings.Networks}}{{$k}}{{end}}' cliproxy-warp 2>/dev/null || true)
            if [ -n "$net" ] && docker run --rm --network "$net" curlimages/curl:8.5.0 \
                -sf --connect-timeout 5 -x socks5h://warp:40000 \
                https://www.cloudflare.com/cdn-cgi/trace 2>/dev/null | grep -q 'warp=on'; then
              echo "[*] warp socks ready"
              ready=1
              break
            fi
            sleep 3
          done
          if [ "$ready" != "1" ]; then
            echo "[!] warp not ready; logs:"
            docker compose logs --tail=80 warp || true
            exit 1
          fi
          docker compose up -d
          # port 8317 — any HTTP response means process up (401/404 ok)
          for i in $(seq 1 90); do
            c=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8317/ 2>/dev/null || echo 000)
            if [ "$c" != "000" ] && [ "$c" != "000000" ]; then
              echo "[*] cliproxy up (http $c)"
              break
            fi
            sleep 2
          done
          c=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8317/ 2>/dev/null || echo 000)
          [ "$c" != "000" ] && [ "$c" != "000000" ] || {
            echo "[!] health failed: $c"
            docker compose ps
            docker compose logs --tail=100 cli-proxy-api || true
            docker compose logs --tail=40 warp || true
            exit 1
          }
          docker compose ps
          net=$(docker inspect -f '{{range $k,$v := .NetworkSettings.Networks}}{{$k}}{{end}}' cliproxy-warp 2>/dev/null || true)
          [ -n "$net" ] && docker run --rm --network "$net" curlimages/curl:8.5.0 \
            -s -x socks5h://warp:40000 https://www.cloudflare.com/cdn-cgi/trace || true

      - name: Start Cloudflare Tunnel (optional)
        run: |
          set -Eeuo pipefail
          if [ -z "${CF_TUNNEL_TOKEN:-}" ]; then
            echo "[*] CF_TUNNEL_TOKEN not set — skip tunnel (local-only)"
            echo "tunnel_enabled=0" >> "$GITHUB_ENV"
            exit 0
          fi
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared
          nohup cloudflared tunnel --no-autoupdate run --token "$CF_TUNNEL_TOKEN" > "$GITHUB_WORKSPACE/tunnel.log" 2>&1 &
          echo $! > /tmp/cloudflared.pid
          sleep 6
          tail -20 "$GITHUB_WORKSPACE/tunnel.log" || true
          echo "tunnel_enabled=1" >> "$GITHUB_ENV"

      - name: Keep alive + checkpoint backup
        working-directory: deploy
        env:
          COMPOSE_FILE: docker-compose.yml:docker-compose.warp.yml
          CLI_PROXY_CONFIG_PATH: ./config.yaml
          CLI_PROXY_AUTH_PATH: ./auths
          CLI_PROXY_LOG_PATH: ./logs
          CLI_PROXY_PLUGIN_PATH: ./plugins
        run: |
          set -Eeuo pipefail
          backup() {
            local msg="${1:-backup}"
            local out="../db-repo/cliproxy-data.tar.gz.tmp"
            local min=200
            echo "[*] dir sizes before tar:"
            sudo du -sh config.yaml auths logs plugins 2>/dev/null || true
            # only pack what exists
            local items=()
            for p in config.yaml auths logs plugins; do
              [ -e "$p" ] && items+=("$p")
            done
            if [ ${#items[@]} -eq 0 ]; then
              echo "[!] nothing to backup"; return 1
            fi
            if ! sudo tar -czf - "${items[@]}" > "$out"; then
              echo "[!] tar failed"; rm -f "$out"; return 1
            fi
            local sz
            sz=$(stat -c%s "$out")
            echo "[*] backup tar ${sz}B"
            if [ "$sz" -lt "$min" ]; then
              echo "[!] backup too small (${sz}B) — not publishing"
              rm -f "$out"
              return 1
            fi
            mv -f "$out" ../db-repo/cliproxy-data.tar.gz
            (set -e; cd ../db-repo
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git add -f cliproxy-data.tar.gz
              git commit -m "$msg" --allow-empty
              git push origin HEAD:main) || { echo "[!] publish failed; retry next checkpoint"; return 0; }
            echo "[*] published $msg (${sz}B)"
          }
          END=$((SECONDS + RUN_DURATION)); LAST=0
          while [ $SECONDS -lt $END ]; do
            if [ "${tunnel_enabled:-0}" = "1" ]; then
              CF=$(cat /tmp/cloudflared.pid 2>/dev/null || echo 0)
              if [ "$CF" -gt 0 ] && ! kill -0 "$CF" 2>/dev/null; then
                echo "[$(date)] cloudflared died, restarting"
                nohup cloudflared tunnel --no-autoupdate run --token "$CF_TUNNEL_TOKEN" > "$GITHUB_WORKSPACE/tunnel.log" 2>&1 &
                echo $! > /tmp/cloudflared.pid
                sleep 3
              fi
            fi
            if ! docker compose ps --status running --services 2>/dev/null | grep -qx warp; then
              echo "[$(date)] warp down — restarting"
              docker compose up -d warp || true
            fi
            c=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8317/ 2>/dev/null || echo 000)
            if [ "$c" = "000" ] || [ "$c" = "000000" ]; then
              echo "[$(date)] app unresponsive — restarting compose"
              docker compose up -d || true
            fi
            NOW=$(date +%s)
            if [ $((NOW - LAST)) -ge 600 ]; then
              backup "backup" || echo "[!] checkpoint failed"
              LAST=$NOW
            fi
            sleep 30
          done

      - name: Final diagnostics + backup
        if: always()
        env:
          COMPOSE_FILE: docker-compose.yml:docker-compose.warp.yml
        run: |
          set -Eeuo pipefail
          echo "=== docker ps ==="
          docker ps -a || true
          echo "=== cliproxy logs ==="
          (cd deploy && docker compose logs --tail=100 cli-proxy-api) || true
          echo "=== warp logs ==="
          (cd deploy && docker compose logs --tail=60 warp) || true
          echo "=== tunnel.log ==="
          tail -40 "$GITHUB_WORKSPACE/tunnel.log" 2>/dev/null || true
          if [ ! -d deploy ]; then
            echo "[!] no deploy dir — skip final backup"
            exit 0
          fi
          out=db-repo/cliproxy-data.tar.gz.tmp
          min=200
          items=()
          for p in config.yaml auths logs plugins; do
            [ -e "deploy/$p" ] && items+=("$p")
          done
          if [ ${#items[@]} -eq 0 ]; then
            echo "[!] nothing to backup"
            exit 0
          fi
          echo "[*] final dir sizes:"
          (cd deploy && sudo du -sh "${items[@]}" 2>/dev/null) || true
          if (cd deploy && sudo tar -czf - "${items[@]}" > "../$out"); then
            sz=$(stat -c%s "$out")
            echo "[*] final tar ${sz}B"
            if [ "$sz" -ge "$min" ]; then
              mv -f "$out" db-repo/cliproxy-data.tar.gz
              (cd db-repo
                git config user.name "github-actions[bot]"
                git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                git add -f cliproxy-data.tar.gz
                git commit -m "final backup" --allow-empty
                git push origin HEAD:main) || echo "[!] final publish failed"
              echo "[*] final backup published (${sz}B)"
            else
              echo "[!] final backup empty/invalid (${sz}B) — not publishing"
              rm -f "$out"
            fi
          else
            echo "[!] final tar failed"
            rm -f "$out"
          fi
