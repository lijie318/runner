name: Run Service

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: run-group
  cancel-in-progress: false

env:
  PRIVATE_REPO_TOKEN: ${{ secrets.PRIVATE_REPO_TOKEN }}
  CF_TUNNEL_TOKEN: ${{ secrets.CF_TUNNEL_TOKEN }}
  ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
  JWT_SECRET: ${{ secrets.JWT_SECRET }}
  TOTP_ENCRYPTION_KEY: ${{ secrets.TOTP_ENCRYPTION_KEY }}
  POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
  RUN_DURATION: 19800

jobs:
  run:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout runner repo
        uses: actions/checkout@v4

      - name: Checkout Sub2API deploy files
        uses: actions/checkout@v4
        with:
          repository: Wei-Shaw/sub2api
          path: sub2api
          fetch-depth: 1

      - name: Checkout backup repository
        uses: actions/checkout@v4
        with:
          repository: jjjjllll111/db-storage
          token: ${{ secrets.PRIVATE_REPO_TOKEN }}
          path: db-repo
          fetch-depth: 1
          persist-credentials: true

      - name: Prepare deploy dir
        run: |
          set -Eeuo pipefail
          mkdir -p deploy
          cp sub2api/deploy/docker-compose.local.yml deploy/docker-compose.yml
          mkdir -p deploy/data deploy/postgres_data deploy/redis_data
          # restore previous data if present
          if [ -f db-repo/sub2api-data.tar.gz ]; then
            tar -xzf db-repo/sub2api-data.tar.gz -C deploy
            echo "[*] restored sub2api-data.tar.gz"
          else
            echo "[*] no prior backup; fresh start"
          fi
          # WARP overlay: keep workflow-YAML indent, strip fixed 10 spaces only
          cat > deploy/docker-compose.warp.yml <<'YAML'
          services:
            warp:
              image: seiry/cloudflare-warp-proxy
              container_name: sub2api-warp
              restart: unless-stopped
              networks:
                - sub2api-network
              logging:
                driver: json-file
                options:
                  max-size: 1m
                  max-file: "2"
            sub2api:
              environment:
                - HTTP_PROXY=socks5://warp:40000
                - HTTPS_PROXY=socks5://warp:40000
                - ALL_PROXY=socks5://warp:40000
                - NO_PROXY=localhost,127.0.0.1,postgres,redis,warp
                - UPDATE_PROXY_URL=socks5://warp:40000
              depends_on:
                - warp
          YAML
          sed -i 's/^          //' deploy/docker-compose.warp.yml
          JWT_SECRET="${JWT_SECRET:-$(openssl rand -hex 32)}"
          TOTP_ENCRYPTION_KEY="${TOTP_ENCRYPTION_KEY:-$(openssl rand -hex 32)}"
          POSTGRES_PASSWORD="${POSTGRES_PASSWORD:-$(openssl rand -hex 32)}"
          ADMIN_PASSWORD="${ADMIN_PASSWORD:-$(openssl rand -hex 12)}"
          cat > deploy/.env <<EOF
          BIND_HOST=127.0.0.1
          SERVER_PORT=8080
          SERVER_MODE=release
          RUN_MODE=standard
          TZ=Asia/Shanghai
          POSTGRES_USER=sub2api
          POSTGRES_DB=sub2api
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          ADMIN_EMAIL=admin@sub2api.local
          ADMIN_PASSWORD=${ADMIN_PASSWORD}
          JWT_SECRET=${JWT_SECRET}
          TOTP_ENCRYPTION_KEY=${TOTP_ENCRYPTION_KEY}
          AUTO_SETUP=true
          UPDATE_PROXY_URL=socks5://warp:40000
          EOF
          sed -i 's/^          //' deploy/.env
          chmod 600 deploy/.env
          echo "ADMIN_PASSWORD=$ADMIN_PASSWORD" >> "$GITHUB_ENV"
          echo "COMPOSE_FILE=docker-compose.yml:docker-compose.warp.yml" >> "$GITHUB_ENV"
          echo "[*] .env + warp overlay ready"

      - name: Start Sub2API (docker compose + warp)
        working-directory: deploy
        env:
          COMPOSE_FILE: docker-compose.yml:docker-compose.warp.yml
        run: |
          set -Eeuo pipefail
          docker compose pull
          docker compose up -d warp
          # wait SOCKS (proxy mode enroll; probe via sibling curl container)
          ready=0
          for i in $(seq 1 40); do
            if ! docker compose ps --status running --services 2>/dev/null | grep -qx warp; then
              sleep 3
              continue
            fi
            net=$(docker inspect -f '{{range $k,$v := .NetworkSettings.Networks}}{{$k}}{{end}}' sub2api-warp 2>/dev/null || true)
            if [ -n "$net" ] && docker run --rm --network "$net" curlimages/curl:8.5.0 \
                -sf --connect-timeout 5 -x socks5h://warp:40000 \
                https://www.cloudflare.com/cdn-cgi/trace 2>/dev/null | grep -q 'warp=on'; then
              echo "[*] warp socks ready"
              ready=1
              break
            fi
            sleep 3
          done
          if [ "$ready" != "1" ]; then
            echo "[!] warp not ready; logs:"
            docker compose logs --tail=80 warp || true
            exit 1
          fi
          docker compose up -d
          for i in $(seq 1 90); do
            c=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/health 2>/dev/null || echo 000)
            if [ "$c" = "200" ] || [ "$c" = "204" ]; then
              echo "[*] sub2api up ($c)"
              break
            fi
            sleep 2
          done
          c=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8080/health 2>/dev/null || echo 000)
          [ "$c" = "200" ] || [ "$c" = "204" ] || {
            echo "[!] health failed: $c"
            docker compose ps
            docker compose logs --tail=80 sub2api || true
            docker compose logs --tail=40 warp || true
            exit 1
          }
          docker compose ps
          net=$(docker inspect -f '{{range $k,$v := .NetworkSettings.Networks}}{{$k}}{{end}}' sub2api-warp 2>/dev/null || true)
          [ -n "$net" ] && docker run --rm --network "$net" curlimages/curl:8.5.0 \
            -s -x socks5h://warp:40000 https://www.cloudflare.com/cdn-cgi/trace || true
          echo "[*] admin password available in job env (secret-sourced)"

      - name: Start Cloudflare Tunnel (optional)
        run: |
          set -Eeuo pipefail
          if [ -z "${CF_TUNNEL_TOKEN:-}" ]; then
            echo "[*] CF_TUNNEL_TOKEN not set — skip tunnel (local-only)"
            echo "tunnel_enabled=0" >> "$GITHUB_ENV"
            exit 0
          fi
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -o /usr/local/bin/cloudflared
          chmod +x /usr/local/bin/cloudflared
          nohup cloudflared tunnel --no-autoupdate run --token "$CF_TUNNEL_TOKEN" > "$GITHUB_WORKSPACE/tunnel.log" 2>&1 &
          echo $! > /tmp/cloudflared.pid
          sleep 6
          tail -20 "$GITHUB_WORKSPACE/tunnel.log" || true
          echo "tunnel_enabled=1" >> "$GITHUB_ENV"

      - name: Keep alive + checkpoint backup
        working-directory: deploy
        env:
          COMPOSE_FILE: docker-compose.yml:docker-compose.warp.yml
        run: |
          set -Eeuo pipefail
          backup() {
            local msg="${1:-backup}"
            tar -czf ../db-repo/sub2api-data.tar.gz.tmp \
              data postgres_data redis_data .env 2>/dev/null || return 1
            mv ../db-repo/sub2api-data.tar.gz.tmp ../db-repo/sub2api-data.tar.gz
            (set -e; cd ../db-repo
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git add sub2api-data.tar.gz
              git commit -m "$msg" --allow-empty
              git push origin HEAD:main) || { echo "[!] publish failed; retry next checkpoint"; return 0; }
            echo "[*] published $msg"
          }
          END=$((SECONDS + RUN_DURATION)); LAST=0
          while [ $SECONDS -lt $END ]; do
            if [ "${tunnel_enabled:-0}" = "1" ]; then
              CF=$(cat /tmp/cloudflared.pid 2>/dev/null || echo 0)
              if [ "$CF" -gt 0 ] && ! kill -0 "$CF" 2>/dev/null; then
                echo "[$(date)] cloudflared died, restarting"
                nohup cloudflared tunnel --no-autoupdate run --token "$CF_TUNNEL_TOKEN" > "$GITHUB_WORKSPACE/tunnel.log" 2>&1 &
                echo $! > /tmp/cloudflared.pid
                sleep 3
              fi
            fi
            if ! docker compose ps --status running --services 2>/dev/null | grep -qx warp; then
              echo "[$(date)] warp down — restarting"
              docker compose up -d warp || true
            fi
            if ! curl -sf http://127.0.0.1:8080/health >/dev/null 2>&1; then
              echo "[$(date)] app unresponsive — restarting compose"
              docker compose up -d || true
            fi
            NOW=$(date +%s)
            if [ $((NOW - LAST)) -ge 600 ]; then
              backup "backup" || echo "[!] checkpoint failed"
              LAST=$NOW
            fi
            sleep 30
          done

      - name: Final diagnostics + backup
        if: always()
        env:
          COMPOSE_FILE: docker-compose.yml:docker-compose.warp.yml
        run: |
          set -Eeuo pipefail
          echo "=== docker ps ==="
          docker ps -a || true
          echo "=== sub2api logs ==="
          (cd deploy && docker compose logs --tail=100 sub2api) || true
          echo "=== warp logs ==="
          (cd deploy && docker compose logs --tail=60 warp) || true
          echo "=== tunnel.log ==="
          tail -40 "$GITHUB_WORKSPACE/tunnel.log" 2>/dev/null || true
          if [ -d deploy ]; then
            (cd deploy && tar -czf ../db-repo/sub2api-data.tar.gz.tmp \
              data postgres_data redis_data .env 2>/dev/null) && \
              mv db-repo/sub2api-data.tar.gz.tmp db-repo/sub2api-data.tar.gz || true
          fi
          if [ -f db-repo/sub2api-data.tar.gz ]; then
            (cd db-repo
              git config user.name "github-actions[bot]"
              git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
              git add sub2api-data.tar.gz
              git commit -m "final backup" --allow-empty
              git push origin HEAD:main) || echo "[!] final publish failed"
            echo "[*] final backup published"
          fi
