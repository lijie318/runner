name: WinRunner Relay

on:
  workflow_run:
    workflows: ["Run Service"]
    types: [completed]

permissions:
  actions: write
  contents: read

# no cancel-in-progress: failure-triggered skip must not cancel a success-triggered sleep
jobs:
  relay:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Wait before next run
        run: sleep 30

      - name: Trigger next run
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          echo "parent conclusion=${{ github.event.workflow_run.conclusion }} id=${{ github.event.workflow_run.id }}"
          gh workflow run run.yml -R "${{ github.repository }}" --ref main
          echo "Next Sub2API run triggered"
